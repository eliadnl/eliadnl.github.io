<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Accueil - L'Atelier d'Elia</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: #fff8f0;
    }

    header {
      background-color: #446D92;
      color: white;
      padding: 15px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    header h1 {
      margin: 0;
      font-size: 24px;
    }

    nav a {
      color: white;
      text-decoration: none;
      margin-left: 20px;
      font-weight: bold;
    }

    nav a:hover {
      text-decoration: underline;
    }

    main {
      padding: 20px;
      text-align: center;
    }

    .collections {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 20px;
      margin-top: 30px;
    }

    .collection {
      width: 200px;
      cursor: pointer;
      text-align: center;
      border: 1px solid #ccc;
      border-radius: 10px;
      background-color: #fff5e6;
      transition: transform 0.2s;
      padding: 10px;
    }

    .collection img {
      width: 180px;
      height: auto;
      border-radius: 5px;
    }

    .collection p {
      margin-top: 10px;
      font-weight: bold;
      font-size: 16px;
    }

    .collection:hover {
      transform: scale(1.05);
    }

  </style>
</head>
<body>

  <header>
    <h1>L'Atelier d'Elia</h1>
    <nav>
      <a href="index.html">Accueil</a>
      <a href="boutique.html">Boutique</a>
      <a href="contact.html">Contact</a>
    </nav>
  </header>

  <main>
    <h2>Nos Collections</h2>
    <p>Cliquez sur l'image ou le nom pour découvrir les produits</p>

    <div class="collections">
      <!-- Collection Chrétienne N°1 -->
      <div class="collection" onclick="location.href='colombe.html'">
        <img src="images/carte%20colombe%20bleu.png" alt="Illustration Chrétienne">
        <p>Illustration Chrétienne N°1</p>
      </div>

      <!-- Tu pourras ajouter d'autres collections ici plus tard -->
    </div>

  </main>

  <footer style="background-color:#446D92;color:white;padding:15px;text-align:center;">
    <p>&copy; 2026 L'Atelier d'Elia. Tous droits réservés.</p>
  </footer>

</body>
</html>
