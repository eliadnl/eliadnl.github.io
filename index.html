<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Boutique - L'Atelier d'Elia</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: #fff8f0;
    }

    header {
      background-color: #446D92;
      color: white;
      padding: 15px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    header nav a {
      color: white;
      margin-left: 20px;
      text-decoration: none;
      font-weight: bold;
    }
    header nav a:hover {
      text-decoration: underline;
    }

    .cart-indicator {
      background-color: #ff9966;
      padding: 8px 15px;
      border-radius: 20px;
      font-weight: bold;
      cursor: pointer;
    }

    main {
      padding: 20px;
    }

    h1, h2 {
      text-align: center;
    }

    .products-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
      justify-content: center;
      margin-top: 30px;
    }

    .product {
      width: 180px;
      text-align: center;
      border: 1px solid #ccc;
      border-radius: 10px;
      background-color: #fff5e6;
      cursor: pointer;
      transition: transform 0.2s;
      padding: 10px;
    }
    .product img {
      width: 160px;
      height: auto;
      border-radius: 5px;
    }
    .product p {
      margin-top: 5px;
      font-weight: bold;
    }
    .product:hover {
      transform: scale(1.05);
    }
  </style>
</head>
<body>

  <header>
    <div>
      <a href="index.html" style="font-size:18px;">Accueil</a>
      <a href="boutique.html" style="font-size:18px;">Boutique</a>
      <a href="contact.html" style="font-size:18px;">Contact</a>
    </div>
    <div class="cart-indicator" id="cartCount">Panier : 0</div>
  </header>

  <main>
    <h1>Boutique - L'Atelier d'Elia</h1>
    <h2>Nos Collections</h2>

    <div class="products-grid">

      <!-- Colombes -->
      <div class="product" onclick="location.href='colombe.html'">
        <img src="images/carte colombe bleu.png" alt="Colombes">
        <p>Colombes</p>
      </div>

      <!-- Adoration -->
      <div class="product" onclick="location.href='adoration.html'">
        <img src="images/carte adoration rose.png" alt="Adoration">
        <p>Adoration</p>
      </div>

      <!-- Bougies -->
      <div class="product" onclick="location.href='bougies.html'">
        <img src="images/carte bougies verte.png" alt="Bougies">
        <p>Bougies</p>
      </div>

    </div>
  </main>

  <script>
    let cart = [];
    const cartCount = document.getElementById('cartCount');

    function addToCart(name, price) {
      cart.push({name, price});
      cartCount.textContent = `Panier : ${cart.length}`;
      console.log(cart);
    }
  </script>
</body>
</html>
