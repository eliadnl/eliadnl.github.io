<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Boutique - L'Atelier d'Elia</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Montserrat', sans-serif;
  background-color: #f6f1ea;
  color: #2d2d2d;
}

/* HEADER */
header {
  background-color: #ffffff;
  padding: 20px 60px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 1px solid #eee;
}

.logo {
  font-family: 'Playfair Display', serif;
  font-size: 24px;
}

nav {
  display: flex;
  gap: 30px;
}

nav a {
  text-decoration: none;
  color: #2d2d2d;
  font-size: 14px;
  letter-spacing: 1px;
  text-transform: uppercase;
}

nav a:hover {
  opacity: 0.6;
}

.cart-indicator {
  background-color: #c89b5e;
  color: white;
  padding: 8px 22px;
  border-radius: 30px;
  font-size: 13px;
  cursor: pointer;
}

/* MAIN */
main {
  padding: 40px 20px;
}

/* TITRES */
h1 {
  font-family: 'Playfair Display', serif;
  font-size: 42px;
  font-weight: 400;
  text-align: center;
  margin-top: 40px;
  margin-bottom: 10px;
}

h2 {
  font-family: 'Playfair Display', serif;
  font-weight: 400;
  text-align: center;
  color: #c89b5e;
  margin-bottom: 50px;
}

/* PRODUITS */
.products-grid {
  display: flex;
  flex-wrap: wrap;
  gap: 60px;
  justify-content: center;
}

.product {
  width: 220px;
  text-align: center;
  cursor: pointer;
  transition: transform 0.3s ease;
}

.product img {
  width: 100%;
  border-radius: 6px;
  transition: opacity 0.3s ease;
}

.product p {
  margin-top: 15px;
  font-family: 'Playfair Display', serif;
  font-size: 18px;
  letter-spacing: 1px;
}

.product:hover {
  transform: translateY(-6px);
}

.product:hover img {
  opacity: 0.85;
}

/* PANIER OVERLAY */
#cartOverlay {
  display: none;
  position: fixed;
  top: 90px;
  right: 30px;
  width: 300px;
  max-height: 400px;
  overflow-y: auto;
  background: white;
  border-radius: 15px;
  padding: 20px;
  box-shadow: 0 15px 35px rgba(0,0,0,0.12);
  z-index: 100;
}

#cartOverlay h3 {
  font-family: 'Playfair Display', serif;
  text-align: center;
  font-weight: 400;
  margin-top: 0;
}

.cart-item {
  display: flex;
  align-items: center;
  margin-bottom: 15px;
  font-size: 14px;
}

.cart-item img {
  width: 45px;
  margin-right: 10px;
  border-radius: 5px;
}

/* BOUTON PAYER */
#payButton {
  width: 100%;
  padding: 12px;
  margin-top: 15px;
  background: #c89b5e;
  color: white;
  border: none;
  border-radius: 30px;
  font-size: 13px;
  letter-spacing: 1px;
  cursor: pointer;
  transition: background 0.3s ease;
}

#payButton:hover {
  background: #b58345;
}

/* FOOTER */
footer {
  background-color: #f6f1ea;
  padding: 20px;
  text-align: center;
  border-top: 1px solid #eee;
}
footer a {
  text-decoration: none;
  color: #2d2d2d;
  display: inline-flex;
  align-items: center;
  gap: 15px;
}
footer a img {
  width: 70px;
  height: 70px;
}
footer a span {
  font-size: 20px;
  font-weight: bold;
}
</style>
</head>
<body>

<header>
  <div class="logo">L'Atelier d'Elia</div>
  <nav>
    <a href="index.html">Accueil</a>
    <a href="boutique.html">Boutique</a>
    <a href="contact.html">Contact</a>
  </nav>
  <div class="cart-indicator" id="cartCount" onclick="toggleCart()">Panier : 0</div>
</header>

<main>
<h1>Bienvenue sur la boutique de L'Atelier d'Elia</h1>
<h2>Découvrez la derniere collection</h2>

<div class="products-grid">
  <div class="product" onclick="location.href='colombe.html'">
    <img src="images/carte colombe bleu.png" alt="Colombe">
    <p>Colombe</p>
  </div>

  <div class="product" onclick="location.href='adoration.html'">
    <img src="images/carte adoration rose.png" alt="Adoration">
    <p>Adoration</p>
  </div>

  <div class="product" onclick="location.href='bougies.html'">
    <img src="images/carte bougies verte.png" alt="Bougies">
    <p>Bougies</p>
  </div>
</div>
</main>


<script>
let cart = [];
const cartCount = document.getElementById('cartCount');
const cartOverlay = document.getElementById('cartOverlay');
const cartItems = document.getElementById('cartItems');

if(localStorage.getItem('cart')) {
  cart = JSON.parse(localStorage.getItem('cart'));
  updateCartCount();
  renderCart();
}

function addToCart(name, price, imgSrc){
  cart.push({name, price, imgSrc, quantity: 1});
  updateCartCount();
  renderCart();
  localStorage.setItem('cart', JSON.stringify(cart));
}

function renderCart(){
  cartItems.innerHTML = '';
  cart.forEach(item => {
    const div = document.createElement('div');
    div.className = 'cart-item';
    div.innerHTML = `<img src="${item.imgSrc}" alt="${item.name}">
                     <div>${item.name} - ${item.price || '3'}€</div>`;
    cartItems.appendChild(div);
  });
}

function updateCartCount(){
  const total = cart.reduce((sum, item) => sum + (item.quantity || 1), 0);
  cartCount.textContent = `Panier : ${total}`;
}

function toggleCart(){
  cartOverlay.style.display = (cartOverlay.style.display === 'block') ? 'none' : 'block';
}
</script>

<!-- BANNIÈRE INSTAGRAM -->
<footer>
  <a href="https://www.instagram.com/latelier_delia" target="_blank">
    <img src="images/logo instagram.png" alt="Instagram">
    <span>@latelier_delia</span>
  </a>
  <p>&copy; 2026 L'Atelier d'Elia. Tous droits réservés.</p>
</footer>

</body>
</html>
