<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Boutique - L'Atelier d'Elia</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      display: flex;
      margin: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: #fff8f0;
    }

    /* Sidebar */
    .sidebar {
      width: 180px;
      background-color: #446D92;
      color: white;
      padding: 20px;
      min-height: 100vh;
      box-sizing: border-box;
    }
    .sidebar h2 {
      font-size: 18px;
      margin-bottom: 15px;
    }
    .sidebar a {
      display: block;
      color: white;
      text-decoration: none;
      margin-bottom: 10px;
      font-weight: bold;
      cursor: pointer;
    }
    .sidebar a:hover {
      text-decoration: underline;
    }

    /* Main content */
    .main-content {
      flex: 1;
      padding: 20px;
      box-sizing: border-box;
      position: relative;
    }

    /* Cart indicator */
    .cart-indicator {
      position: absolute;
      top: 20px;
      right: 20px;
      background-color: #ff9966;
      color: white;
      padding: 8px 15px;
      border-radius: 20px;
      font-weight: bold;
      cursor: pointer;
    }

    /* Product grid */
    .products-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 15px;
      margin-top: 50px;
    }

    .product {
      width: 180px;
      text-align: center;
      border: 1px solid #ccc;
      border-radius: 10px;
      background-color: #fff5e6;
      cursor: pointer;
      transition: transform 0.2s;
      padding: 10px;
    }
    .product img {
      width: 160px;
      height: auto;
      border-radius: 5px;
    }
    .product p {
      margin-top: 5px;
      font-weight: bold;
    }
    .product:hover {
      transform: scale(1.05);
    }
  </style>
</head>
<body>

  <!-- Sidebar -->
  <div class="sidebar">
    <h2>Collections</h2>
    <a onclick="filterCollection('colombes')">Colombes</a>
    <a onclick="filterCollection('adoration')">Adoration</a>
    <a onclick="filterCollection('bougies')">Bougies</a>
  </div>

  <!-- Main content -->
  <div class="main-content">
    <div class="cart-indicator" id="cartCount">Panier : 0</div>

    <h1>Boutique - L'Atelier d'Elia</h1>
    <div class="products-grid" id="productsGrid">

      <!-- Colombes -->
      <div class="product" data-collection="colombes" onclick="location.href='colombe.html'">
        <img src="images/carte%20colombe%20bleu.png" alt="Colombes">
        <p>Colombes</p>
      </div>

      <!-- Adoration -->
      <div class="product" data-collection="adoration" onclick="location.href='adoration.html'">
        <img src="images/carte%20adoration%20rose.png" alt="Adoration">
        <p>Adoration</p>
      </div>

      <!-- Bougies -->
      <div class="product" data-collection="bougies" onclick="location.href='bougies.html'">
        <img src="images/carte%20bougies%20verte.png" alt="Bougies">
        <p>Bougies</p>
      </div>

    </div>
  </div>

  <script>
    let cart = [];
    const cartCount = document.getElementById('cartCount');

    function addToCart(name, price) {
      cart.push({name, price});
      cartCount.textContent = `Panier : ${cart.length}`;
      console.log(cart);
    }

    function filterCollection(collection) {
      const products = document.querySelectorAll('.product');
      products.forEach(prod => {
        if(prod.dataset.collection === collection) {
          prod.style.display = 'block';
        } else {
          prod.style.display = 'none';
        }
      });
    }
  </script>
</body>
</html>
