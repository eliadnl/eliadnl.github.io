<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Boutique - L'Atelier d'Elia</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .product {
      display: inline-block;
      text-align: center;
      margin: 15px;
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 10px;
      width: 200px;
      background-color: #fff5e6;
      cursor: pointer;
      transition: transform 0.2s;
    }
    .product:hover {
      transform: scale(1.05);
    }
    .product img {
      width: 180px;
      height: auto;
      border-radius: 5px;
    }
    .product p {
      margin-top: 5px;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <header>
    <h1>L'Atelier d'Elia</h1>
    <nav>
      <a href="index.html">Accueil</a>
      <a href="boutique.html">Boutique</a>
      <a href="contact.html">Contact</a>
    </nav>
  </header>

  <main>
    <h2>Nos Collections</h2>
    <p>Cliquez sur une illustration pour choisir la couleur et le format :</p>

    <div class="product" onclick="location.href='colombe.html'">
      <img src="images/carte colombe bleu.png" alt="Colombes">
      <p>Colombes</p>
    </div>

    <div class="product" onclick="location.href='adoration.html'">
      <img src="images/carte adoration rose.png" alt="Adoration">
      <p>Adoration</p>
    </div>

    <div class="product" onclick="location.href='bougies.html'">
      <img src="images/carte bougies verte.png" alt="Bougies">
      <p>Bougies</p>
    </div>

  </main>

  <footer>
    <p>&copy; 2026 L'Atelier d'Elia. Tous droits réservés.</p>
  </footer>
</body>
</html>
