<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Boutique - L'Atelier d'Elia</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Montserrat', sans-serif;
  background-color: #f6f1ea;
  color: #2d2d2d;
}

header {
  background-color: #ffffff;
  padding: 20px 60px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 1px solid #eee;
}

.logo {
  font-family: 'Playfair Display', serif;
  font-size: 24px;
}

nav {
  display: flex;
  gap: 30px;
}

nav a {
  text-decoration: none;
  color: #2d2d2d;
  font-size: 14px;
  letter-spacing: 1px;
  text-transform: uppercase;
}

nav a:hover {
  opacity: 0.6;
}

.cart-indicator {
  background-color: #c89b5e;
  color: white;
  padding: 8px 22px;
  border-radius: 30px;
  font-size: 13px;
  cursor: pointer;
}

.filter-container {
  text-align: center;
  margin: 30px 0;
}

.filter-container select {
  padding: 8px 12px;
  border-radius: 8px;
  border: 1px solid #ccc;
}

h1 {
  font-family: 'Playfair Display', serif;
  font-size: 42px;
  text-align: center;
  margin-top: 50px;
}

.products-grid {
  display: flex;
  flex-wrap: wrap;
  gap: 40px;
  justify-content: center;
  padding-bottom: 80px;
}

.product {
  width: 220px;
  text-align: center;
  transition: transform 0.3s ease;
}

.product img {
  width: 100%;
  border-radius: 8px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.08);
}

.product:hover {
  transform: translateY(-5px);
}

.product button {
  margin-top: 12px;
  background-color: #c89b5e;
  color: white;
  border: none;
  padding: 10px 25px;
  border-radius: 30px;
  cursor: pointer;
}

.product-price {
  display: block;
  color: #c89b5e;
  font-weight: bold;
  margin-top: 5px;
}

#cartOverlay {
  display: none;
  position: fixed;
  top: 90px;
  right: 30px;
  width: 300px;
  max-height: 400px;
  overflow-y: auto;
  background: white;
  border-radius: 15px;
  padding: 20px;
  box-shadow: 0 15px 35px rgba(0,0,0,0.12);
  z-index: 100;
}
</style>
</head>
<body>

<header>
  <div class="logo">L'Atelier d'Elia</div>
  <nav>
    <a href="index.html">Accueil</a>
    <a href="boutique.html">Boutique</a>
    <a href="contact.html">Contact</a>
  </nav>
  <div class="cart-indicator" id="cartCount" onclick="toggleCart()">Panier : 0</div>
</header>

<main>
<h1>Boutique</h1>

<div class="filter-container">
  <select id="filterSelect" onchange="applyFilter()">
    <option value="all">Tous les produits</option>

    <optgroup label="Couleur">
      <option value="bleu">Bleu</option>
      <option value="rose">Rose</option>
      <option value="verte">Verte</option>
    </optgroup>

    <optgroup label="Illustration">
      <option value="Colombe">Colombe</option>
      <option value="Adoration">Adoration</option>
      <option value="Bougies">Bougies</option>
    </optgroup>

    <optgroup label="Format">
      <option value="carte">Carte</option>
      <option value="stickers">Stickers</option>
    </optgroup>
  </select>
</div>

<div class="products-grid">

<div class="product" data-color="bleu" data-type="Colombe" data-format="carte">
<img src="images/carte colombe bleu.png">
<p>Carte colombe fond bleu<br><span class="product-price">3€</span></p>
<button onclick="addToCart('Carte colombe fond bleu',3,'images/carte colombe bleu.png')">Ajouter</button>
</div>

<div class="product" data-color="rose" data-type="Colombe" data-format="carte">
<img src="images/carte colombe rose.png">
<p>Carte colombe fond rose<br><span class="product-price">3€</span></p>
<button onclick="addToCart('Carte colombe fond rose',3,'images/carte colombe rose.png')">Ajouter</button>
</div>

<div class="product" data-color="verte" data-type="Colombe" data-format="carte">
<img src="images/carte colombe verte.png">
<p>Carte colombe fond vert<br><span class="product-price">3€</span></p>
<button onclick="addToCart('Carte colombe fond vert',3,'images/carte colombe verte.png')">Ajouter</button>
</div>

<div class="product" data-color="bleu" data-type="Colombe" data-format="stickers">
<img src="images/stickers colombe bleu.png">
<p>Stickers colombe fond bleu<br><span class="product-price">3€</span></p>
<button onclick="addToCart('Stickers colombe fond bleu',3,'images/stickers colombe bleu.png')">Ajouter</button>
</div>

<div class="product" data-color="rose" data-type="Colombe" data-format="stickers">
<img src="images/stickers colombe rose.png">
<p>Stickers colombe fond rose<br><span class="product-price">3€</span></p>
<button onclick="addToCart('Stickers colombe fond rose',3,'images/stickers colombe rose.png')">Ajouter</button>
</div>

<div class="product" data-color="verte" data-type="Colombe" data-format="stickers">
<img src="images/stickers colombe vert.png">
<p>Stickers colombe fond vert<br><span class="product-price">3€</span></p>
<button onclick="addToCart('Stickers colombe fond vert',3,'images/stickers colombe vert.png')">Ajouter</button>
</div>

</div>
</main>

<script>
let cart = JSON.parse(localStorage.getItem('cart')) || [];
const cartCount = document.getElementById('cartCount');
updateCartCount();

function addToCart(name, price, imgSrc){
  const existing = cart.find(item => item.name === name);
  if(existing){ existing.quantity += 1; }
  else{ cart.push({name, price, imgSrc, quantity:1}); }
  localStorage.setItem('cart', JSON.stringify(cart));
  updateCartCount();
}

function updateCartCount(){
  const total = cart.reduce((sum, item) => sum + item.quantity, 0);
  cartCount.textContent = "Panier : " + total;
}

function toggleCart(){}

function applyFilter(){
  const filter = document.getElementById('filterSelect').value;
  const products = document.querySelectorAll('.product');

  products.forEach(prod => {
    const color = prod.dataset.color;
    const type = prod.dataset.type;
    const format = prod.dataset.format;

    if(filter === "all" || filter === color || filter === type || filter === format){
      prod.style.display = "block";
    } else {
      prod.style.display = "none";
    }
  });
}
</script>

</body>
</html>
