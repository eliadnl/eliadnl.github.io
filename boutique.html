<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Boutique - L'Atelier d'Elia</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Montserrat', sans-serif;
  background-color: #f6f1ea;
  color: #2d2d2d;
}

/* HEADER */
header {
  background-color: #ffffff;
  padding: 20px 60px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 1px solid #eee;
}

.logo {
  font-family: 'Playfair Display', serif;
  font-size: 24px;
}

nav {
  display: flex;
  gap: 30px;
}

nav a {
  text-decoration: none;
  color: #2d2d2d;
  font-size: 14px;
  letter-spacing: 1px;
  text-transform: uppercase;
}

nav a:hover {
  opacity: 0.6;
}

.cart-indicator {
  background-color: #c89b5e;
  color: white;
  padding: 8px 22px;
  border-radius: 30px;
  font-size: 13px;
  cursor: pointer;
}

/* PRODUITS */
.products-grid {
  display: flex;
  flex-wrap: wrap;
  gap: 60px;
  justify-content: center;
  padding-bottom: 80px;
}

.product {
  width: 240px;
  text-align: center;
  transition: transform 0.3s ease;
}

.product img {
  width: 100%;
  border-radius: 8px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.08);
}

.product:hover {
  transform: translateY(-6px);
}

.product button {
  margin-top: 12px;
  background-color: #c89b5e;
  color: white;
  border: none;
  padding: 10px 25px;
  border-radius: 30px;
  cursor: pointer;
}

.product p {
  margin-top: 15px;
  font-family: 'Playfair Display', serif;
  font-size: 18px;
  letter-spacing: 1px;
}

.product-price {
  display: block;
  margin-top: 5px;
  color: #c89b5e;
  font-weight: bold;
}

/* PANIER */
#cartOverlay {
  display: none;
  position: fixed;
  top: 90px;
  right: 30px;
  width: 300px;
  max-height: 400px;
  overflow-y: auto;
  background: white;
  border-radius: 15px;
  padding: 20px;
  box-shadow: 0 15px 35px rgba(0,0,0,0.12);
  z-index: 100;
}

.cart-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 15px;
  font-size: 14px;
}

.cart-item img {
  width: 45px;
  border-radius: 5px;
  margin-right: 10px;
}

.cart-button {
  width: 100%;
  padding: 12px;
  margin-top: 15px;
  background: #c89b5e;
  color: white;
  border: none;
  border-radius: 30px;
  font-size: 13px;
  letter-spacing: 1px;
  cursor: pointer;
}
</style>
</head>
<body>

<header>
  <div class="logo">L'Atelier d'Elia</div>
  <nav>
    <a href="index.html">Accueil</a>
    <a href="boutique.html">Boutique</a>
    <a href="contact.html">Contact</a>
  </nav>
  <div class="cart-indicator" id="cartCount" onclick="toggleCart()">Panier : 0</div>
</header>

<main>
<h1 style="text-align:center;margin-top:50px;font-family:'Playfair Display',serif;">Boutique</h1>

<div class="products-grid">

<div class="product">
  <img src="images/carte colombe bleu.png">
  <p>Carte colombe fond bleu<span class="product-price">3€</span></p>
  <button onclick="addToCart('Carte colombe fond bleu',3,'images/carte colombe bleu.png')">Ajouter au panier</button>
</div>

<div class="product">
  <img src="images/carte colombe rose.png">
  <p>Carte colombe fond rose<span class="product-price">3€</span></p>
  <button onclick="addToCart('Carte colombe fond rose',3,'images/carte colombe rose.png')">Ajouter au panier</button>
</div>

<div class="product">
  <img src="images/carte colombe verte.png">
  <p>Carte colombe fond vert<span class="product-price">3€</span></p>
  <button onclick="addToCart('Carte colombe fond vert',3,'images/carte colombe verte.png')">Ajouter au panier</button>
</div>

</div>
</main>

<div id="cartOverlay">
  <h3 style="text-align:center;font-family:'Playfair Display',serif;">Panier</h3>
  <div id="cartItems"></div>
  <button class="cart-button" onclick="validerCommande()">Valider la commande</button>
</div>

<script>
let cart = JSON.parse(localStorage.getItem('cart')) || [];
const cartCount = document.getElementById('cartCount');
const cartOverlay = document.getElementById('cartOverlay');
const cartItems = document.getElementById('cartItems');

updateCartCount();
renderCart();

function addToCart(name, price, imgSrc){
  const existing = cart.find(i => i.name === name);
  if(existing) existing.quantity++;
  else cart.push({name, price, imgSrc, quantity:1});
  saveCart();
  renderCart();
}

function saveCart(){
  localStorage.setItem('cart', JSON.stringify(cart));
  updateCartCount();
}

function updateCartCount(){
  cartCount.textContent = `Panier : ${cart.reduce((sum,i)=>sum+i.quantity,0)}`;
}

function renderCart(){
  cartItems.innerHTML='';
  cart.forEach(item=>{
    const div=document.createElement('div');
    div.classList.add('cart-item');
    div.innerHTML=`
      <img src="${item.imgSrc}">
      <div>${item.name} x${item.quantity}</div>
    `;
    cartItems.appendChild(div);
  });
}

function toggleCart(){
  cartOverlay.style.display = cartOverlay.style.display === 'block' ? 'none' : 'block';
}

function validerCommande(){
  if(cart.length === 0){
    alert("Votre panier est vide.");
    return;
  }

  localStorage.setItem('cart', JSON.stringify(cart));
  window.location.href = "commande.html";
}
</script>

</body>
</html>
