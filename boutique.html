<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Boutique - L'Atelier d'Elia</title>
<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #fff8f0;
}

header {
  background: #446D92;
  color: white;
  padding: 15px 20px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

nav a {
  color: white;
  text-decoration: none;
  margin-right: 20px;
  font-weight: bold;
}

nav a:hover {
  text-decoration: underline;
}

.cart {
  background: #ff9966;
  padding: 8px 15px;
  border-radius: 20px;
  font-weight: bold;
}

main {
  padding: 30px;
}

h1, h2 {
  text-align: center;
}

.products {
  display: flex;
  flex-wrap: wrap;
  gap: 25px;
  justify-content: center;
}

.card {
  width: 180px;
  background: #fff5e6;
  border-radius: 10px;
  padding: 10px;
  text-align: center;
  cursor: pointer;
  transition: 0.2s;
}

.card:hover {
  transform: scale(1.05);
}

.card img {
  width: 160px;   /* ✅ même largeur que l'accueil */
  height: auto;   /* ✅ conserve le ratio original */
  border-radius: 8px;
}
</style>
</head>
<body>

<header>
  <nav>
    <a href="index.html">Accueil</a>
    <a href="boutique.html">Boutique</a>
    <a href="contact.html">Contact</a>
  </nav>
  <div class="cart">Panier : 0</div>
</header>

<main>
<h1>Première Collection d'Illustration Chrétienne</h1>

<div class="products">

  <!-- COLOMBES -->
  <div class="card" onclick="location.href='colombe-produit.html'">
    <img src="images/carte%20colombe%20bleu.png" alt="Colombe bleue">
  </div>
  <div class="card" onclick="location.href='colombe-produit.html'">
    <img src="images/carte%20colombe%20rose.png" alt="Colombe rose">
  </div>
  <div class="card" onclick="location.href='colombe-produit.html'">
    <img src="images/carte%20colombe%20verte.png" alt="Colombe verte">
  </div>

  <!-- ADORATION -->
  <div class="card" onclick="location.href='adoration-produit.html'">
    <img src="images/carte%20adoration%20bleu.png" alt="Adoration bleue">
  </div>
  <div class="card" onclick="location.href='adoration-produit.html'">
    <img src="images/carte%20adoration%20rose.png" alt="Adoration rose">
  </div>
  <div class="card" onclick="location.href='adoration-produit.html'">
    <img src="images/carte%20adoration%20verte.png" alt="Adoration verte">
  </div>

  <!-- BOUGIES -->
  <div class="card" onclick="location.href='bougies-produit.html'">
    <img src="images/carte%20bougies%20bleu.png" alt="Bougies bleues">
  </div>
  <div class="card" onclick="location.href='bougies-produit.html'">
    <img src="images/carte%20bougies%20rose.png" alt="Bougies roses">
  </div>
  <div class="card" onclick="location.href='bougies-produit.html'">
    <img src="images/cartes%20bougies%20verte.png" alt="Bougies vertes">
  </div>

</div>
</main>

</body>
</html>
