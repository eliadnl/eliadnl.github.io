<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Boutique - L'Atelier d'Elia</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Montserrat', sans-serif;
  background-color: #f6f1ea;
  color: #2d2d2d;
}

header {
  background-color: #ffffff;
  padding: 20px 60px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 1px solid #eee;
}

.logo {
  font-family: 'Playfair Display', serif;
  font-size: 24px;
}

nav {
  display: flex;
  gap: 30px;
}

nav a {
  text-decoration: none;
  color: #2d2d2d;
  font-size: 14px;
  letter-spacing: 1px;
  text-transform: uppercase;
}

nav a:hover {
  opacity: 0.6;
}

.cart-indicator {
  background-color: #c89b5e;
  color: white;
  padding: 8px 22px;
  border-radius: 30px;
  font-size: 13px;
  cursor: pointer;
}

h1 {
  font-family: 'Playfair Display', serif;
  font-size: 42px;
  text-align: center;
  margin-top: 50px;
}

.filter-container {
  text-align: center;
  margin: 40px 0;
}

.filters-group {
  margin-bottom: 25px;
}

.filters-group h4 {
  margin-bottom: 10px;
  font-weight: 400;
}

.filter-btn {
  padding: 8px 16px;
  margin: 6px;
  border-radius: 25px;
  border: 1px solid #c89b5e;
  background: white;
  cursor: pointer;
  transition: 0.3s;
}

.filter-btn:hover {
  background-color: #f0e6d8;
}

.filter-btn.active {
  background-color: #c89b5e;
  color: white;
}

.filter-btn.active::after {
  content: " ✓";
  font-weight: bold;
}

.reset-btn {
  margin-bottom: 20px;
  padding: 10px 20px;
  border-radius: 25px;
  border: 1px solid #c89b5e;
  background: white;
  cursor: pointer;
  font-weight: bold;
  transition: 0.3s;
}

.reset-btn:hover {
  background-color: #f0e6d8;
}

.products-grid {
  display: flex;
  flex-wrap: wrap;
  gap: 40px;
  justify-content: center;
  padding-bottom: 80px;
}

.product {
  width: 220px;
  text-align: center;
  transition: transform 0.3s ease;
}

.product img {
  width: 100%;
  border-radius: 8px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.08);
}

.product:hover {
  transform: translateY(-5px);
}

.product button {
  margin-top: 12px;
  background-color: #c89b5e;
  color: white;
  border: none;
  padding: 10px 25px;
  border-radius: 30px;
  cursor: pointer;
}

.product-price {
  display: block;
  color: #c89b5e;
  font-weight: bold;
  margin-top: 5px;
}
</style>
</head>
<body>

<header>
  <div class="logo">L'Atelier d'Elia</div>
  <nav>
    <a href="index.html">Accueil</a>
    <a href="boutique.html">Boutique</a>
    <a href="contact.html">Contact</a>
  </nav>
  <div class="cart-indicator" id="cartCount">Panier : 0</div>
</header>

<main>
<h1>Boutique</h1>

<div class="filter-container">

  <button class="reset-btn" id="resetFilters">Réinitialiser les filtres</button>

  <div class="filters-group">
    <h4>Couleur</h4>
    <button class="filter-btn" data-filter="bleu">Bleu</button>
    <button class="filter-btn" data-filter="rose">Rose</button>
    <button class="filter-btn" data-filter="verte">Verte</button>
  </div>

  <div class="filters-group">
    <h4>Illustration</h4>
    <button class="filter-btn" data-filter="Colombe">Colombe</button>
    <button class="filter-btn" data-filter="Adoration">Adoration</button>
    <button class="filter-btn" data-filter="Bougies">Bougies</button>
  </div>

  <div class="filters-group">
    <h4>Format</h4>
    <button class="filter-btn" data-filter="carte">Carte</button>
    <button class="filter-btn" data-filter="stickers">Stickers</button>
  </div>

</div>

<div class="products-grid">

<div class="product" data-color="bleu" data-type="Colombe" data-format="carte">
<img src="images/carte colombe bleu.png">
<p>Carte colombe fond bleu<br><span class="product-price">3€</span></p>
<button onclick="addToCart('Carte colombe fond bleu',3)">Ajouter</button>
</div>

<div class="product" data-color="rose" data-type="Colombe" data-format="carte">
<img src="images/carte colombe rose.png">
<p>Carte colombe fond rose<br><span class="product-price">3€</span></p>
<button onclick="addToCart('Carte colombe fond rose',3)">Ajouter</button>
</div>

<div class="product" data-color="verte" data-type="Colombe" data-format="stickers">
<img src="images/stickers colombe vert.png">
<p>Stickers colombe fond vert<br><span class="product-price">3€</span></p>
<button onclick="addToCart('Stickers colombe fond vert',3)">Ajouter</button>
</div>

</div>
</main>

<script>
let cart = JSON.parse(localStorage.getItem('cart')) || [];
const cartCount = document.getElementById('cartCount');
updateCartCount();

function addToCart(name, price){
  const existing = cart.find(item => item.name === name);
  if(existing){ existing.quantity += 1; }
  else{ cart.push({name, price, quantity:1}); }
  localStorage.setItem('cart', JSON.stringify(cart));
  updateCartCount();
}

function updateCartCount(){
  const total = cart.reduce((sum, item) => sum + item.quantity, 0);
  cartCount.textContent = "Panier : " + total;
}

const selectedFilters = [];
const filterButtons = document.querySelectorAll('.filter-btn');
const resetBtn = document.getElementById('resetFilters');

filterButtons.forEach(button => {
  button.addEventListener('click', () => {
    const value = button.dataset.filter;
    if(selectedFilters.includes(value)){
      selectedFilters.splice(selectedFilters.indexOf(value), 1);
      button.classList.remove('active');
    } else {
      selectedFilters.push(value);
      button.classList.add('active');
    }
    applyFilters();
  });
});

resetBtn.addEventListener('click', () => {
  selectedFilters.length = 0;
  filterButtons.forEach(btn => btn.classList.remove('active'));
  applyFilters();
});

function applyFilters(){
  const products = document.querySelectorAll('.product');

  products.forEach(prod => {
    const color = prod.dataset.color;
    const type = prod.dataset.type;
    const format = prod.dataset.format;

    if(selectedFilters.length === 0){
      prod.style.display = "block";
      return;
    }

    if(
      selectedFilters.includes(color) ||
      selectedFilters.includes(type) ||
      selectedFilters.includes(format)
    ){
      prod.style.display = "block";
    } else {
      prod.style.display = "none";
    }
  });
}
</script>

</body>
</html>
