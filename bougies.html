<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Colombe - L'Atelier d'Elia</title>

<!-- Google Fonts élégantes -->
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">

<style>

body {
  margin: 0;
  background-color: #f6f1ea;
  font-family: 'Montserrat', sans-serif;
  color: #2d2d2d;
}

/* HEADER */
header {
  background-color: #ffffff;
  padding: 20px 40px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  border-bottom: 1px solid #eee;
}

header a {
  text-decoration: none;
  color: #2d2d2d;
  margin-right: 30px;
  font-size: 14px;
  letter-spacing: 1px;
  text-transform: uppercase;
  transition: opacity 0.3s ease;
}

header a:hover {
  opacity: 0.6;
}

/* PANIER */
.cart-indicator {
  background-color: #c89b5e;
  color: white;
  padding: 8px 20px;
  border-radius: 30px;
  font-size: 13px;
  letter-spacing: 1px;
  cursor: pointer;
  transition: background 0.3s ease;
}

.cart-indicator:hover {
  background-color: #b58345;
}

/* TITRES */
h1 {
  font-family: 'Playfair Display', serif;
  font-size: 42px;
  font-weight: 400;
  text-align: center;
  margin-top: 50px;
  margin-bottom: 10px;
}

h2 {
  font-family: 'Playfair Display', serif;
  font-weight: 400;
  text-align: center;
  color: #c89b5e;
  margin-bottom: 50px;
}

/* PRODUITS */
.products-grid {
  display: flex;
  flex-wrap: wrap;
  gap: 60px;
  justify-content: center;
  padding-bottom: 80px;
}

.product {
  width: 240px;
  text-align: center;
  cursor: pointer;
  transition: transform 0.3s ease;
}

.product img {
  width: 100%;
  border-radius: 8px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.08);
  transition: opacity 0.3s ease;
}

.product p {
  margin-top: 12px;
  font-family: 'Playfair Display', serif;
  font-size: 18px;
}

.product:hover {
  transform: translateY(-6px);
}

.product:hover img {
  opacity: 0.9;
}

.product button{
  margin-top: 12px;
  background-color: #c89b5e;
  color: white;
  border: none;
  padding: 10px 25px;
  border-radius: 30px;
  cursor: pointer;
  letter-spacing: 1px;
  transition: background 0.3s ease;
}

.product button:hover{
  background-color: #b58345;
}

/* PANIER OVERLAY */
#cartOverlay {
  display: none;
  position: fixed;
  top: 90px;
  right: 30px;
  width: 300px;
  max-height: 400px;
  overflow-y: auto;
  background: white;
  border-radius: 15px;
  padding: 20px;
  box-shadow: 0 15px 35px rgba(0,0,0,0.12);
  z-index: 100;
}

#cartOverlay h3 {
  font-family: 'Playfair Display', serif;
  text-align: center;
  font-weight: 400;
  margin-top: 0;
}

.cart-item {
  display: flex;
  align-items: center;
  margin-bottom: 15px;
  font-size: 14px;
}

.cart-item img {
  width: 45px;
  margin-right: 10px;
  border-radius: 5px;
}

#payButton {
  width: 100%;
  padding: 12px;
  margin-top: 15px;
  background: #c89b5e;
  color: white;
  border: none;
  border-radius: 30px;
  font-size: 13px;
  letter-spacing: 1px;
  cursor: pointer;
  transition: background 0.3s ease;
}

#payButton:hover {
  background: #b58345;
}

</style>
</head>
