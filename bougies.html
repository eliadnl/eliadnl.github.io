<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bougies - L'Atelier d'Elia</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  background-color: #f6f1ea;
  font-family: 'Montserrat', sans-serif;
  color: #2d2d2d;
}

/* HEADER IDENTIQUE ACCUEIL */
header {
  background-color: #ffffff;
  padding: 20px 60px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 1px solid #eee;
}

.logo {
  font-family: 'Playfair Display', serif;
  font-size: 24px;
}

nav {
  display: flex;
  gap: 40px;
}

nav a {
  text-decoration: none;
  color: #2d2d2d;
  font-size: 14px;
  letter-spacing: 1px;
  text-transform: uppercase;
}

nav a:hover {
  opacity: 0.6;
}

.cart-indicator {
  background-color: #c89b5e;
  color: white;
  padding: 8px 22px;
  border-radius: 30px;
  font-size: 13px;
  cursor: pointer;
}

h1 {
  font-family: 'Playfair Display', serif;
  font-size: 42px;
  text-align: center;
  margin-top: 50px;
}

h2 {
  font-family: 'Playfair Display', serif;
  text-align: center;
  color: #c89b5e;
  margin-bottom: 50px;
}

.products-grid {
  display: flex;
  flex-wrap: wrap;
  gap: 60px;
  justify-content: center;
  padding-bottom: 80px;
}

.product {
  width: 240px;
  text-align: center;
  transition: transform 0.3s ease;
}

.product img {
  width: 100%;
  border-radius: 8px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.08);
}

.product:hover {
  transform: translateY(-6px);
}

.product button {
  margin-top: 12px;
  background-color: #c89b5e;
  color: white;
  border: none;
  padding: 10px 25px;
  border-radius: 30px;
  cursor: pointer;
}

#cartOverlay {
  display: none;
  position: fixed;
  top: 90px;
  right: 30px;
  width: 300px;
  max-height: 400px;
  overflow-y: auto;
  background: white;
  border-radius: 15px;
  padding: 20px;
  box-shadow: 0 15px 35px rgba(0,0,0,0.12);
  z-index: 100;
}
</style>
</head>

<body>

<header>
  <div class="logo">L'Atelier d'Elia</div>
  <nav>
    <a href="index.html">Accueil</a>
    <a href="boutique.html">Boutique</a>
    <a href="contact.html">Contact</a>
  </nav>
  <div class="cart-indicator" id="cartCount" onclick="toggleCart()">Panier : 0</div>
</header>

<main>
<h1>Bougies</h1>
<h2>Choisissez votre bougie</h2>

<div class="products-grid">
  <div class="product">
    <img src="images/bougie1.png">
    <p>Bougies bleu 3€</p>
    <button onclick="addToCart('Bougie 1', 5, 'images/carte bougies bleu.png')">Ajouter au panier</button>
  </div>

  <div class="product">
    <img src="images/bougie2.png">
    <p>Bougies roses 3€</p>
    <button onclick="addToCart('Bougie 2', 5, 'images/carte bougies rose.png')">Ajouter au panier</button>
  </div>

  <div class="product">
    <img src="images/bougie3.png">
    <p>Bougies vertes€</p>
    <button onclick="addToCart('Bougie 3', 5, 'images/carte bougies verte.png')">Ajouter au panier</button>
  </div>
</div>
</main>

<div id="cartOverlay">
  <h3>Panier</h3>
  <div id="cartItems"></div>
  <button onclick="location.href='paiement.html'">Payer</button>
</div>

<script>
let cart = JSON.parse(localStorage.getItem('cart')) || [];
const cartCount = document.getElementById('cartCount');
const cartOverlay = document.getElementById('cartOverlay');
const cartItems = document.getElementById('cartItems');

cartCount.textContent = `Panier : ${cart.length}`;
renderCart();

function addToCart(name, price, imgSrc){
  cart.push({name, price, imgSrc});
  cartCount.textContent = `Panier : ${cart.length}`;
  localStorage.setItem('cart', JSON.stringify(cart));
  renderCart();
}

function renderCart(){
  cartItems.innerHTML = '';
  cart.forEach(item => {
    cartItems.innerHTML += `<div>${item.name} - ${item.price}€</div>`;
  });
}

function toggleCart(){
  cartOverlay.style.display = cartOverlay.style.display === 'block' ? 'none' : 'block';
}
</script>

</body>
</html>
