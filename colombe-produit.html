<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Colombe</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#fff8f0;
  text-align:center;
}

.topbar{
  display:flex;
  justify-content:space-between;
  padding:20px;
}

.back{
  cursor:pointer;
  font-size:20px;
}

.cart{
  background:#ff9966;
  padding:8px 15px;
  border-radius:20px;
  color:white;
  font-weight:bold;
}

img{
  width:300px;
  border-radius:10px;
}

.colors{
  margin-top:20px;
}

.colors button{
  margin:5px;
  padding:10px 20px;
  border:none;
  border-radius:20px;
  cursor:pointer;
  font-weight:bold;
}

.bleu{ background:#dbe6e4; }
.rose{ background:#c6908f; }
.vert{ background:#96ab91; }

.add{
  margin-top:20px;
  padding:10px 25px;
  background:#446D92;
  color:white;
  border:none;
  border-radius:25px;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="topbar">
  <div class="back" onclick="history.back()">← Retour</div>
  <div class="cart" id="cart">Panier : 0</div>
</div>

<h2>Colombe</h2>

<img id="image" src="images/carte colombe bleu.png">

<div class="colors">
  <button class="bleu" onclick="change('bleu')">Bleu</button>
  <button class="rose" onclick="change('rose')">Rose</button>
  <button class="vert" onclick="change('verte')">Vert</button>
</div>

<button class="add" onclick="add()">Ajouter au panier</button>

<script>
let count = 0;

function change(color){
  document.getElementById("image").src =
  "images/carte colombe " + color + ".png";
}

function add(){
  count++;
  document.getElementById("cart").innerText =
  "Panier : " + count;
}
</script>

</body>
</html>
