<!DOCTYPE html> 
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Colombes - L'Atelier d'Elia</title>

  <!-- Google Fonts élégantes -->
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">

  <style>

    body {
      margin: 0;
      background-color: #f6f1ea;
      font-family: 'Montserrat', sans-serif;
      color: #2d2d2d;
    }

    /* HEADER */
    header {
      background-color: #ffffff;
      padding: 20px 40px;
      border-bottom: 1px solid #eee;
      text-align: center;
    }

    header h1 {
      font-family: 'Playfair Display', serif;
      font-weight: 400;
      margin: 0 0 10px 0;
    }

    nav a {
      text-decoration: none;
      color: #2d2d2d;
      margin: 0 20px;
      font-size: 14px;
      letter-spacing: 1px;
      text-transform: uppercase;
      transition: opacity 0.3s ease;
    }

    nav a:hover {
      opacity: 0.6;
    }

    /* PANIER FIXE */
    #cartCount {
      background-color: #c89b5e;
      color: white;
      padding: 8px 20px;
      border-radius: 30px;
      font-size: 13px;
      letter-spacing: 1px;
      cursor: pointer;
      position: fixed;
      top: 20px;
      right: 30px;
      z-index: 200;
      transition: background 0.3s ease;
    }

    #cartCount:hover {
      background-color: #b58345;
    }

    /* CONTENU PRODUIT */
    .product-container {
      text-align: center;
      margin-top: 60px;
    }

    .product-container h2 {
      font-family: 'Playfair Display', serif;
      font-size: 36px;
      font-weight: 400;
      margin-bottom: 10px;
    }

    .color-selector button {
      background-color: #c89b5e;
      color: white;
      border: none;
      padding: 10px 20px;
      margin: 8px;
      border-radius: 30px;
      cursor: pointer;
      font-family: 'Montserrat', sans-serif;
      letter-spacing: 1px;
      transition: background 0.3s ease;
    }

    .color-selector button:hover {
      background-color: #b58345;
    }

    #productImage {
      width: 300px;
      height: auto;
      margin-top: 30px;
      border-radius: 8px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.08);
    }

    #price {
      font-family: 'Playfair Display', serif;
      font-size: 20px;
      margin-top: 20px;
    }

    .add-cart-btn {
      background-color: #c89b5e;
      color: white;
      border: none;
      padding: 12px 30px;
      margin-top: 15px;
      border-radius: 30px;
      cursor: pointer;
      letter-spacing: 1px;
      transition: background 0.3s ease;
    }

    .add-cart-btn:hover {
      background-color: #b58345;
    }

    a {
      color: #c89b5e;
      text-decoration: none;
    }

    a:hover {
      opacity: 0.7;
    }

    /* PANIER OVERLAY */
    #cartOverlay {
      display: none;
      position: fixed;
      top: 90px;
      right: 30px;
      width: 300px;
      max-height: 400px;
      overflow-y: auto;
      background: white;
      border-radius: 15px;
      padding: 20px;
      box-shadow: 0 15px 35px rgba(0,0,0,0.12);
      z-index: 100;
    }

    #cartOverlay h3 {
      font-family: 'Playfair Display', serif;
      text-align: center;
      font-weight: 400;
      margin-top: 0;
    }

    .cart-item {
      display: flex;
      align-items: center;
      margin-bottom: 15px;
      font-size: 14px;
    }

    .cart-item img {
      width: 45px;
      margin-right: 10px;
      border-radius: 5px;
    }

    #payButton {
      width: 100%;
      padding: 12px;
      margin-top: 15px;
      background: #c89b5e;
      color: white;
      border: none;
      border-radius: 30px;
      font-size: 13px;
      letter-spacing: 1px;
      cursor: pointer;
      transition: background 0.3s ease;
    }

    #payButton:hover {
      background: #b58345;
    }

    footer {
      text-align: center;
      margin-top: 80px;
      padding: 20px;
      background-color: #ffffff;
      border-top: 1px solid #eee;
      font-size: 14px;
    }

  </style>
</head>
