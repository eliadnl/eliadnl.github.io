<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Colombes - L'Atelier d'Elia</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  background-color: #f6f1ea;
  font-family: 'Montserrat', sans-serif;
  color: #2d2d2d;
}

/* HEADER */
header {
  background-color: #ffffff;
  padding: 20px 60px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 1px solid #eee;
}

.logo {
  font-family: 'Playfair Display', serif;
  font-size: 24px;
}

nav {
  display: flex;
  gap: 40px;
}

nav a {
  text-decoration: none;
  color: #2d2d2d;
  font-size: 14px;
  letter-spacing: 1px;
  text-transform: uppercase;
}

nav a:hover {
  opacity: 0.6;
}

.cart-indicator {
  background-color: #c89b5e;
  color: white;
  padding: 8px 22px;
  border-radius: 30px;
  font-size: 13px;
  cursor: pointer;
}

/* TITRES */
h1 {
  font-family: 'Playfair Display', serif;
  font-size: 42px;
  text-align: center;
  margin-top: 50px;
}

h2 {
  font-family: 'Playfair Display', serif;
  text-align: center;
  color: #c89b5e;
  margin-bottom: 50px;
}

/* PRODUITS */
.products-grid {
  display: flex;
  flex-wrap: wrap;
  gap: 60px;
  justify-content: center;
  padding-bottom: 80px;
}

.product {
  width: 240px;
  text-align: center;
  transition: transform 0.3s ease;
}

.product img {
  width: 100%;
  border-radius: 8px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.08);
}

.product:hover {
  transform: translateY(-6px);
}

.product button {
  margin-top: 12px;
  background-color: #c89b5e;
  color: white;
  border: none;
  padding: 10px 25px;
  border-radius: 30px;
  cursor: pointer;
}

/* PRIX EN DORÉ SUR LIGNE SÉPARÉE */
.product-price {
  display: block;
  margin-top: 5px;
  color: #c89b5e; /* couleur dorée */
  font-weight: bold;
}

/* PANIER */
#cartOverlay {
  display: none;
  position: fixed;
  top: 90px;
  right: 30px;
  width: 300px;
  max-height: 400px;
  overflow-y: auto;
  background: white;
  border-radius: 15px;
  padding: 20px;
  box-shadow: 0 15px 35px rgba(0,0,0,0.12);
  z-index: 100;
}

.cart-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 15px;
}

.cart-item img {
  width: 50px;
  border-radius: 5px;
  margin-right: 10px;
}

.cart-item-details {
  flex: 1;
}

.cart-item-controls {
  display: flex;
  align-items: center;
  gap: 5px;
}

.cart-item-controls button {
  padding: 3px 8px;
  cursor: pointer;
  border: 1px solid #c89b5e;
  background: white;
  color: #c89b5e;
  border-radius: 5px;
}

.cart-item-remove {
  cursor: pointer;
  color: red;
  font-weight: bold;
  margin-left: 5px;
}

.cart-button {
  margin-top: 12px;
  background-color: #c89b5e;
  color: white;
  border: none;
  padding: 10px 25px;
  border-radius: 30px;
  cursor: pointer;
  font-size: 14px;
}

.cart-button:hover {
  opacity: 0.8;
}
</style>
</head>

<body>

<header>
  <div class="logo">L'Atelier d'Elia</div>
  <nav>
    <a href="index.html">Accueil</a>
    <a href="boutique.html">Boutique</a>
    <a href="contact.html">Contact</a>
  </nav>
  <div class="cart-indicator" id="cartCount" onclick="toggleCart()">Panier : 0</div>
</header>

<main>
<h1>Colombes</h1>
<h2>Choisissez votre illustration</h2>

<div class="products-grid">
  <div class="product">
    <img src="images/carte colombe bleu.png" alt="Colombe fond bleu">
    <p>Colombe fond bleu<br><span class="product-price">3€</span></p>
    <button onclick="addToCart('Colombe fond bleu', 3, 'images/carte colombe bleu.png')">Ajouter au panier</button>
  </div>

  <div class="product">
    <img src="images/carte colombe rose.png" alt="Colombe fond rose">
    <p>Colombe fond rose<br><span class="product-price">3€</span></p>
    <button onclick="addToCart('Colombe fond rose', 3, 'images/carte colombe rose.png')">Ajouter au panier</button>
  </div>

  <div class="product">
    <img src="images/carte colombe verte.png" alt="Colombe fond vert">
    <p>Colombe fond vert<br><span class="product-price">3€</span></p>
    <button onclick="addToCart('Colombe fond vert', 3, 'images/carte colombe verte.png')">Ajouter au panier</button>
  </div>
</div>
</main>

<div id="cartOverlay">
  <h3>Panier</h3>
  <div id="cartItems"></div>
  <button class="cart-button" onclick="finaliserCommande()">Finaliser la commande</button>
</div>

<script>
let cart = JSON.parse(localStorage.getItem('cart')) || [];
const cartCount = document.getElementById('cartCount');
const cartOverlay = document.getElementById('cartOverlay');
const cartItems = document.getElementById('cartItems');

updateCartCount();
renderCart();

function addToCart(name, price, imgSrc) {
  const existingItem = cart.find(item => item.name === name);
  if (existingItem) {
    existingItem.quantity += 1;
  } else {
    cart.push({name, price, imgSrc, quantity:1});
  }
  saveCart();
  renderCart();
}

function removeFromCart(name) {
  cart = cart.filter(item => item.name !== name);
  saveCart();
  renderCart();
}

function changeQuantity(name, delta) {
  const item = cart.find(i => i.name === name);
  if (!item) return;
  item.quantity += delta;
  if(item.quantity < 1){
    removeFromCart(name);
  } else {
    saveCart();
  }
  renderCart();
}

function saveCart() {
  localStorage.setItem('cart', JSON.stringify(cart));
  updateCartCount();
}

function updateCartCount() {
  const totalItems = cart.reduce((sum, item) => sum + item.quantity, 0);
  cartCount.textContent = `Panier : ${totalItems}`;
}

function renderCart() {
  cartItems.innerHTML = '';
  cart.forEach(item => {
    const div = document.createElement('div');
    div.classList.add('cart-item');
    div.innerHTML = `
      <img src="${item.imgSrc}" alt="${item.name}">
      <div class="cart-item-details">${item.name} - ${item.price}€</div>
      <div class="cart-item-controls">
        <button onclick="changeQuantity('${item.name}', -1)">-</button>
        <span>${item.quantity}</span>
        <button onclick="changeQuantity('${item.name}', 1)">+</button>
        <span class="cart-item-remove" onclick="removeFromCart('${item.name}')">×</span>
      </div>
    `;
    cartItems.appendChild(div);
  });
}

function toggleCart() {
  cartOverlay.style.display = cartOverlay.style.display === 'block' ? 'none' : 'block';
}

function finaliserCommande() {
  let total = cart.reduce((sum, item) => sum + item.price * item.quantity, 0);
  localStorage.setItem('totalCommande', total.toFixed(2));
  window.location.href = 'payement.html';
}
</script>

</body>
</html>
