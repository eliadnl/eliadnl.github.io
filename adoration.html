<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Commande - L'Atelier d'Elia</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Montserrat', sans-serif;
  background-color: #f6f1ea;
  color: #2d2d2d;
}
header {
  background-color: #fff;
  padding: 20px 60px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  border-bottom: 1px solid #eee;
}
.logo { font-family: 'Playfair Display', serif; font-size:24px; }
nav a { text-decoration:none; margin-left:20px; color:#2d2d2d; font-size:14px; text-transform:uppercase; }
nav a:hover { opacity:0.6; }
h1 { text-align:center; font-family:'Playfair Display', serif; margin-top:50px; }
h2 { font-family:'Playfair Display', serif; color:#c89b5e; text-align:center; margin:30px 0; }
.order-container { max-width:900px; margin: 0 auto; padding:20px; background:white; border-radius:10px; box-shadow:0 10px 25px rgba(0,0,0,0.1); }
.order-items { margin-bottom:40px; }
.order-item { display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid #eee; padding:10px 0; }
.order-item img { width:60px; border-radius:5px; margin-right:10px; }
.order-item-details { flex:1; }
.total { text-align:right; font-weight:bold; font-size:18px; margin-top:10px; }
form { display:flex; flex-direction:column; gap:15px; }
input, textarea { padding:10px; border-radius:5px; border:1px solid #ccc; width:100%; font-size:14px; }
button { background-color:#c89b5e; color:white; border:none; padding:12px; border-radius:30px; cursor:pointer; font-size:16px; }
button:hover { opacity:0.9; }
</style>
</head>

<body>

<header>
  <div class="logo">L'Atelier d'Elia</div>
  <nav>
    <a href="index.html">Accueil</a>
    <a href="boutique.html">Boutique</a>
  </nav>
</header>

<h1>Votre commande</h1>

<div class="order-container">
  <h2>Articles dans le panier</h2>
  <div class="order-items" id="orderItems">
    <!-- Les articles du panier seront injectés ici -->
  </div>
  <div class="total" id="totalPrice">Total : 0€</div>

  <h2>Vos informations</h2>
  <form id="orderForm">
    <input type="text" id="name" placeholder="Nom complet" required>
    <input type="email" id="email" placeholder="Email" required>
    <textarea id="address" placeholder="Adresse" rows="3" required></textarea>
    <button type="submit">Valider la commande</button>
  </form>
</div>

<script>
// Récupérer le panier depuis localStorage
let cart = JSON.parse(localStorage.getItem('cart')) || [];
const orderItems = document.getElementById('orderItems');
const totalPrice = document.getElementById('totalPrice');

// Affichage des articles
function renderOrder() {
  orderItems.innerHTML = '';
  let total = 0;
  cart.forEach(item => {
    const div = document.createElement('div');
    div.classList.add('order-item');
    div.innerHTML = `
      <img src="${item.imgSrc}" alt="${item.name}">
      <div class="order-item-details">${item.name} - ${item.price}€ x ${item.quantity}</div>
      <div>${item.price * item.quantity}€</div>
    `;
    orderItems.appendChild(div);
    total += item.price * item.quantity;
  });
  totalPrice.textContent = `Total : ${total}€`;
}
renderOrder();

// Gestion formulaire
document.getElementById('orderForm').addEventListener('submit', function(e){
  e.preventDefault();
  const name = document.getElementById('name').value.trim();
  const email = document.getElementById('email').value.trim();
  const address = document.getElementById('address').value.trim();
  if(!name || !email || !address) return alert("Merci de remplir tous les champs !");
  
  // Ici tu peux envoyer les infos à ton serveur ou API
  alert(`Merci ${name} ! Votre commande a été enregistrée.\nTotal : ${totalPrice.textContent}`);
  
  // Vider le panier
  cart = [];
  localStorage.setItem('cart', JSON.stringify(cart));
  renderOrder();
  this.reset();
});
</script>

</body>
</html>
