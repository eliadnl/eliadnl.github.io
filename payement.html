<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Paiement - L'Atelier d'Elia</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  background-color:#f6f1ea;
  font-family:'Montserrat',sans-serif;
  text-align:center;
}

h1{
  margin-top:60px;
  font-family:'Playfair Display',serif;
}

.total-box{
  font-size:22px;
  margin:30px 0;
  font-weight:bold;
}

button{
  background:#c89b5e;
  color:white;
  border:none;
  padding:15px 40px;
  border-radius:30px;
  font-size:18px;
  cursor:pointer;
  margin:20px;
}

button:hover{
  opacity:0.9;
}
</style>
</head>
<body>

<h1>Choisissez votre mode de paiement</h1>

<div class="total-box">
  Total à payer : <span id="total"></span> €
</div>

<!-- Bouton Stripe -->
<button onclick="payerCarte()">
  💳 Payer par carte bancaire
</button>

<br>

<!-- Bouton PayPal -->
<button onclick="payerPaypal()">
  🟡 Payer avec PayPal
</button>

<script>
const total = localStorage.getItem('totalCommande') || "0.00";
document.getElementById("total").textContent = total;

// 🔵 Stripe (pour l'instant redirection simple)
function payerCarte(){
  alert("Ici tu connecteras Stripe plus tard.");
  // Tu pourras mettre ton lien Stripe ici
  // window.location.href = "https://checkout.stripe.com/...";
}

// 🟡 PayPal
function payerPaypal(){
  window.location.href = `https://www.paypal.com/paypalme/latelierdelia/${total}`;
}
</script>

</body>
</html>
